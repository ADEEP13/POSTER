<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Mob · The Spark — Sanchalana Samvega 2026</title>

<!-- EPIC PRO aesthetic: Bebas Neue (ultra-condensed display) + Cormorant Garamond (elegant serif) + Rajdhani (sharp UI) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Three.js r128 — 3D scene + particles -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- GSAP — animation + choreography -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS — CSS CUSTOM PROPERTIES
══════════════════════════════════════════ */
:root {
  --bg:        #030012;
  --violet:    #6e00ff;
  --violet-d:  #3a0080;
  --cyan:      #00e5ff;
  --magenta:   #ff0099;
  --gold:      #ffc400;
  --white:     #ffffff;

  --f-epic:    'Bebas Neue', cursive;
  --f-serif:   'Cormorant Garamond', serif;
  --f-ui:      'Rajdhani', sans-serif;

  --ease-snap: cubic-bezier(0.22, 1, 0.36, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-ui);
}

/* ══════════════════════════════════════════
   THREE.JS CANVAS — full-bleed 3D scene
══════════════════════════════════════════ */
#bg-canvas {
  position: fixed; inset: 0;
  width: 100% !important; height: 100% !important;
  z-index: 0;
}

/* Depth vignette over canvas */
#vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 15%, rgba(3,0,18,0.82) 100%);
  z-index: 1;
  pointer-events: none;
}

/* ══════════════════════════════════════════
   POSTER SHELL
══════════════════════════════════════════ */
#poster {
  position: relative;
  z-index: 10;
  width: 500px;

  /* Layered glass base */
  background:
    linear-gradient(160deg,
      rgba(80, 0, 200, 0.22) 0%,
      rgba(3, 0, 30, 0.60) 50%,
      rgba(0, 50, 100, 0.18) 100%
    );
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);

  border-radius: 24px;
  overflow: hidden;

  /* Pulsing neon glow (cycling through cyan → magenta → violet) */
  animation: shellGlow 6s ease-in-out infinite;
}

@keyframes shellGlow {
  0%,100% {
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.65),
      0 0 40px rgba(110,0,255,0.45),
      0 0 100px rgba(255,0,153,0.08),
      inset 0 0 70px rgba(110,0,255,0.07);
  }
  33% {
    box-shadow:
      0 0 0 1px rgba(255,0,153,0.65),
      0 0 40px rgba(0,229,255,0.40),
      0 0 100px rgba(110,0,255,0.12),
      inset 0 0 70px rgba(0,229,255,0.05);
  }
  66% {
    box-shadow:
      0 0 0 1px rgba(110,0,255,0.70),
      0 0 40px rgba(255,0,153,0.38),
      0 0 100px rgba(0,229,255,0.08),
      inset 0 0 70px rgba(255,0,153,0.04);
  }
}

/* ── Decorative layers ──────────────────── */

/* Grid */
.p-grid {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,229,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.05) 1px, transparent 1px);
  background-size: 30px 30px;
}
.p-grid::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(110,0,255,0.28) 1px, transparent 1px);
  background-size: 30px 30px;
  background-position: -15px -15px;
}

/* Scan-line overlay */
.p-scan {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.045) 2px, rgba(0,0,0,0.045) 4px
  );
}

/* Top neon highlight line */
.p-highlight {
  position: absolute; top: 0; left: 0; right: 0; height: 1px; z-index: 6;
  background: linear-gradient(
    90deg,
    transparent 0%,
    var(--cyan) 25%,
    var(--violet) 55%,
    var(--magenta) 78%,
    transparent 100%
  );
  animation: highlightPulse 4s ease-in-out infinite;
}
@keyframes highlightPulse {
  0%,100% { opacity: 0.55; }
  50%      { opacity: 1; filter: blur(0.8px); }
}

/* Animated chromatic bottom bar */
.p-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px; z-index: 20;
  background: linear-gradient(90deg,
    var(--cyan), var(--violet), var(--magenta), var(--gold), var(--cyan)
  );
  background-size: 300% 100%;
  animation: barFlow 4s linear infinite;
}
@keyframes barFlow {
  0% { background-position: 0%; }
  100% { background-position: 300%; }
}

/* Floating CSS particles within poster */
.spark {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 5;
  animation: sparkFloat var(--d, 7s) ease-in-out infinite var(--delay, 0s);
}
@keyframes sparkFloat {
  0%   { transform: translate(0, 0) scale(1); opacity: var(--o1, 0.55); }
  40%  { transform: translate(var(--tx, 8px), var(--ty, -18px)) scale(1.3); }
  75%  { opacity: var(--o2, 0.25); }
  100% { transform: translate(0, -45px) scale(0); opacity: 0; }
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.p-header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 28px 18px;
  border-bottom: 0.5px solid rgba(110,0,255,0.3);
}
.p-header::after {
  content: '';
  position: absolute; bottom: -0.5px; left: 14%; right: 14%; height: 0.5px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  filter: blur(0.5px);
}
.inst-block { text-align: center; }

.inst-name {
  font-family: var(--f-epic);
  font-size: 1.15rem; letter-spacing: 0.2em;
  color: var(--white);
  text-shadow: 0 0 14px rgba(0,229,255,0.65);
  line-height: 1;
}
.inst-sub {
  font-family: var(--f-serif);
  font-style: italic; font-size: 0.62rem;
  color: rgba(0,229,255,0.6);
  letter-spacing: 0.1em; margin-top: 3px;
}
.hdiv {
  width: 1px; height: 36px; flex-shrink: 0;
  background: linear-gradient(to bottom, transparent, rgba(255,0,153,0.65), transparent);
}

/* ══════════════════════════════════════════
   EVENT BADGE — EPIC TYPOGRAPHIC OVERLAY
══════════════════════════════════════════ */
.p-badge {
  position: relative; z-index: 10;
  text-align: center; padding: 18px 28px 0;
  display: flex; justify-content: center; align-items: center;
}

.badge-wrapper {
  display: flex; align-items: center; gap: 12px;
}

.badge-line {
  width: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan));
}

.badge-line.right {
  background: linear-gradient(-90deg, transparent, var(--magenta));
}

.badge-text {
  font-family: var(--f-epic); 
  font-size: 1.15rem; letter-spacing: 0.35em;
  color: var(--white); 
  text-shadow: 
    0 0 10px rgba(0,229,255,0.6),
    0 0 20px rgba(255,0,153,0.3);
}

.badge-year {
  color: var(--cyan);
  font-weight: 700;
}

/* ══════════════════════════════════════════
   MAIN TITLE — EPIC PRO STYLE
══════════════════════════════════════════ */
.p-title {
  position: relative; z-index: 10;
  text-align: center; padding: 10px 20px 0;
}

/* FLASH — solid white with deep violet shadow stack */
.t-flash {
  font-family: var(--f-epic);
  font-size: 7rem; line-height: 0.86;
  color: var(--white);
  letter-spacing: 0.06em;
  display: block;
  text-shadow:
    0 0 18px rgba(255,255,255,0.8),
    0 0 50px var(--violet),
    0 0 100px rgba(110,0,255,0.35),
    5px 5px 0 rgba(80,0,200,0.75),
    10px 10px 0 rgba(40,0,100,0.45),
    15px 15px 25px rgba(20,0,60,0.5);
  position: relative;
}

/* Glitch layers on FLASH — CSS-only, fires every 5s */
.t-flash::before {
  content: 'FLASH';
  position: absolute; top: 0; left: 0; right: 0;
  font-family: var(--f-epic); font-size: inherit; letter-spacing: inherit;
  color: var(--cyan); opacity: 0;
  text-shadow: none;
  animation: glitchA 5s ease-in-out infinite 2.5s;
}
.t-flash::after {
  content: 'FLASH';
  position: absolute; top: 0; left: 0; right: 0;
  font-family: var(--f-epic); font-size: inherit; letter-spacing: inherit;
  color: var(--magenta); opacity: 0;
  text-shadow: none;
  animation: glitchB 5s ease-in-out infinite 2.65s;
}
@keyframes glitchA {
  0%,86%,100% { opacity:0; transform:none; clip-path:none; }
  87% { opacity:0.75; transform:translateX(-6px) skewX(-5deg);
        clip-path:polygon(0 12%,100% 12%,100% 38%,0 38%); }
  89% { opacity:0; }
  91% { opacity:0.5; transform:translateX(5px);
        clip-path:polygon(0 60%,100% 60%,100% 82%,0 82%); }
  93% { opacity:0; }
}
@keyframes glitchB {
  0%,86%,100% { opacity:0; transform:none; clip-path:none; }
  87% { opacity:0.6; transform:translateX(6px) skewX(4deg);
        clip-path:polygon(0 38%,100% 38%,100% 60%,0 60%); }
  89% { opacity:0; }
  91% { opacity:0.4; transform:translateX(-4px);
        clip-path:polygon(0 4%,100% 4%,100% 22%,0 22%); }
  93% { opacity:0; }
}

/* MOB — outlined cyan stroke, no fill */
.t-mob {
  font-family: var(--f-epic);
  font-size: 7rem; line-height: 0.86;
  color: transparent;
  -webkit-text-stroke: 2.5px var(--cyan);
  letter-spacing: 0.06em;
  display: block;
  text-shadow:
    0 0 35px var(--cyan),
    0 0 80px rgba(0,229,255,0.3);
  position: relative;
}

/* "the spark" — Cormorant Garamond elegant serif */
.t-sub {
  font-family: var(--f-serif);
  font-style: italic; font-weight: 300;
  font-size: 1.65rem;
  color: var(--gold);
  letter-spacing: 0.22em;
  text-shadow:
    0 0 22px rgba(255,196,0,0.75),
    0 0 55px rgba(255,196,0,0.3);
  display: block; margin-top: 12px;
}

/* ══════════════════════════════════════════
   DIVIDER
══════════════════════════════════════════ */
.p-divider {
  position: relative; z-index: 10;
  display: flex; align-items: center; gap: 10px;
  padding: 18px 28px;
}
.dline {
  flex: 1; height: 0.5px;
  background: linear-gradient(90deg, transparent, rgba(110,0,255,0.7), transparent);
}
.dgemstone {
  width: 9px; height: 9px; flex-shrink: 0;
  border: 1px solid var(--magenta);
  transform: rotate(45deg);
  box-shadow: 0 0 12px var(--magenta), inset 0 0 4px rgba(255,0,153,0.25);
}
.dtext {
  font-family: var(--f-ui); font-weight: 700;
  font-size: 0.58rem; letter-spacing: 0.35em;
  color: rgba(255,0,153,0.85);
  text-transform: uppercase; white-space: nowrap;
}

/* ══════════════════════════════════════════
   DATE — oversized Epic numeral
══════════════════════════════════════════ */
.p-date {
  position: relative; z-index: 10;
  text-align: center; padding: 0 28px 8px;
}
.date-num {
  font-family: var(--f-epic);
  font-size: 5.5rem; color: var(--white); line-height: 1;
  text-shadow:
    0 0 15px rgba(255,255,255,0.5),
    0 0 45px var(--magenta),
    5px 5px 0 rgba(180,0,90,0.75),
    10px 10px 20px rgba(90,0,45,0.5);
  letter-spacing: -0.02em;
}
.date-label {
  font-family: var(--f-ui); font-weight: 700;
  font-size: 0.82rem; letter-spacing: 0.48em;
  color: var(--cyan); text-transform: uppercase;
  text-shadow: 0 0 14px rgba(0,229,255,0.65);
  margin-top: -5px;
}

/* ══════════════════════════════════════════
   PREMIUM PRODUCTION ROSTER (Epic Pro Layout)
══════════════════════════════════════════ */
.p-roster {
  position: relative; z-index: 10;
  padding: 10px 32px 0;
}
.roster-grid {
  display: flex; justify-content: space-between;
  margin-bottom: 12px;
}
.r-col {
  display: flex; flex-direction: column;
}
.r-col.right { text-align: right; align-items: flex-end; }
.r-col.center { align-items: center; text-align: center; }

.r-lbl {
  font-family: var(--f-ui); font-weight: 700;
  font-size: 0.55rem; letter-spacing: 0.4em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase; margin-bottom: 4px;
}
.r-lbl.cyan { color: var(--cyan); text-shadow: 0 0 10px rgba(0,229,255,0.4); }
.r-lbl.magenta { color: var(--magenta); text-shadow: 0 0 10px rgba(255,0,153,0.4); }

.r-val {
  font-family: var(--f-epic);
  font-size: 2rem; color: var(--white);
  letter-spacing: 0.06em; line-height: 0.9;
  text-shadow: 0 0 20px rgba(255,255,255,0.3);
}
.r-val-ampm {
  font-size: 1.1rem; color: var(--cyan); letter-spacing: 0.1em; margin-left: 2px;
}
.r-val.lg {
  font-size: 2.2rem; letter-spacing: 0.1em;
  background: linear-gradient(180deg, #ffffff 0%, #b3e5fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 15px rgba(0,229,255,0.25));
}
.r-sub {
  font-family: var(--f-serif);
  font-style: italic; font-size: 0.85rem;
  color: var(--gold); letter-spacing: 0.15em;
  margin-top: 5px; text-shadow: 0 0 10px rgba(255,196,0,0.3);
}

.r-line {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,0.4), rgba(255,0,153,0.4), transparent);
  margin: 18px 0;
}

/* ══════════════════════════════════════════
   CURATORS (Epic Pro Layout)
══════════════════════════════════════════ */
.p-curators {
  position: relative; z-index: 10;
  padding: 5px 32px 30px;
}
.c-layout {
  display: flex; justify-content: space-between;
  align-items: center;
}
.c-person {
  display: flex; flex-direction: column;
}
.c-person.right { text-align: right; align-items: flex-end; }

.c-name {
  font-family: var(--f-epic);
  font-size: 1.6rem; color: var(--white);
  letter-spacing: 0.12em; line-height: 1;
}
.c-name.cyan-glow { text-shadow: 0 0 15px rgba(0,229,255,0.5); }
.c-name.magenta-glow { text-shadow: 0 0 15px rgba(255,0,153,0.5); }

.c-role {
  font-family: var(--f-ui); font-size: 0.55rem;
  letter-spacing: 0.35em; color: rgba(255,255,255,0.6);
  text-transform: uppercase; margin-top: 6px;
  display: flex; align-items: center; gap: 8px;
}
.c-role::before {
  content: ''; width: 15px; height: 1px; background: var(--cyan);
}
.c-person.right .c-role::before { display: none; }
.c-person.right .c-role::after {
  content: ''; width: 15px; height: 1px; background: var(--magenta);
}

/* ══════════════════════════════════════════
   MOBILE RESPONSIVENESS (Full Bleed Pro View)
══════════════════════════════════════════ */
@media (max-width: 540px) {
  html, body {
    height: 100%;
    margin: 0;
    overflow-x: hidden;
  }
  
  #poster {
    width: 100%;
    height: 100%;
    max-height: none;
    border-radius: 0;
    border: none;
    background: transparent;
    padding: 60px 20px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow-y: auto;
    backdrop-filter: blur(8px);
    box-shadow: inset 0 0 50px rgba(110,0,255,0.1);
  }
  
  #poster::-webkit-scrollbar {
    width: 0px;
    background: transparent;
  }
  
  .p-header {
    flex-direction: column;
    gap: 12px;
    padding: 10px 0 20px;
    border-bottom: none;
  }
  .p-header::after { display: none; }
  
  .hdiv {
    width: 40%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.65), transparent);
  }
  
  .t-flash, .t-mob {
    font-size: 26vw;
    line-height: 0.85;
  }
  
  .t-sub {
    font-size: 6vw;
    margin-top: 15px;
  }
  
  .date-num {
    font-size: 32vw;
  }
  .date-label {
    font-size: 4vw;
  }
  
  .roster-grid {
    flex-direction: column;
    gap: 30px;
    margin-top: 20px;
  }
  
  .r-col.right {
    text-align: center;
    align-items: center;
  }
  .r-val {
    font-size: 11vw;
  }
  .r-val.lg {
    font-size: 8vw;
  }
  .r-lbl {
    font-size: 3.5vw;
  }
  
  .p-curators {
    padding: 10px 0 40px;
  }
  
  .c-layout {
    flex-direction: column;
    gap: 35px;
    align-items: center;
  }
  .c-person, .c-person.right {
    text-align: center;
    align-items: center;
  }
  .c-name {
    font-size: 8.5vw;
  }
  .c-role::before, .c-person.right .c-role::before {
    content: ''; width: 25px; height: 1px; background: var(--cyan);
    display: block;
  }
  .c-person.right .c-role::after {
    display: none;
  }
}
</style>
</head>
<body>

<!-- Three.js 3D scene canvas -->
<canvas id="bg-canvas"></canvas>
<!-- Depth vignette -->
<div id="vignette"></div>

<!-- ═══════════════════════════════════════
  POSTER
═══════════════════════════════════════ -->
<div id="poster">

  <!-- Decoration layers -->
  <div class="p-grid"></div>
  <div class="p-scan"></div>
  <div class="p-highlight"></div>
  <div class="p-bar"></div>

  <!-- CSS floating sparks -->
  <div class="spark" style="width:3px;height:3px;background:var(--cyan);box-shadow:0 0 7px var(--cyan);top:68%;left:12%;--d:6s;--delay:0s;--tx:9px;--ty:-20px;--o1:.55;--o2:.25;"></div>
  <div class="spark" style="width:2px;height:2px;background:var(--magenta);box-shadow:0 0 7px var(--magenta);top:55%;left:88%;--d:8.5s;--delay:1.2s;--tx:-11px;--ty:-16px;--o1:.5;--o2:.2;"></div>
  <div class="spark" style="width:4px;height:4px;background:var(--violet);box-shadow:0 0 9px var(--violet);top:78%;left:52%;--d:7s;--delay:2.4s;--tx:14px;--ty:-12px;--o1:.65;--o2:.3;"></div>
  <div class="spark" style="width:2px;height:2px;background:var(--gold);box-shadow:0 0 7px var(--gold);top:35%;left:18%;--d:9.5s;--delay:.6s;--tx:-8px;--ty:-22px;--o1:.5;--o2:.2;"></div>
  <div class="spark" style="width:3px;height:3px;background:var(--cyan);box-shadow:0 0 7px var(--cyan);top:82%;left:76%;--d:5.5s;--delay:3.2s;--tx:10px;--ty:-14px;--o1:.6;--o2:.28;"></div>

  <!-- 1 · Header -->
  <div class="p-header" id="ph">
    <div class="inst-block">
      <div class="inst-name">SAI VIDYA</div>
      <div class="inst-sub">Institute of Technology</div>
    </div>
    <div class="hdiv"></div>
    <div class="inst-block">
      <div class="inst-name">SAI VIDYA</div>
      <div class="inst-sub">First Grade College</div>
    </div>
  </div>

  <!-- 2 · Event badge -->
  <div class="p-badge" id="pb">
    <div class="badge-wrapper">
      <div class="badge-line"></div>
      <div class="badge-text">SANCHALANA SAMVEGA <span class="badge-year">26</span></div>
      <div class="badge-line right"></div>
    </div>
  </div>

  <!-- 3 · Main title -->
  <div class="p-title" id="pt">
    <span class="t-flash">FLASH</span>
    <span class="t-mob">MOB</span>
    <span class="t-sub">— the spark —</span>
  </div>

  <!-- 4 · Divider -->
  <div class="p-divider" id="pd">
    <div class="dline"></div>
    <div class="dgemstone"></div>
    <div class="dtext">Mark The Moment</div>
    <div class="dgemstone"></div>
    <div class="dline"></div>
  </div>

  <!-- 5 · Date -->
  <div class="p-date" id="pdt">
    <div class="date-num">31</div>
    <div class="date-label">March · 2026</div>
  </div>

  <!-- 6 · Info roster -->
  <div class="p-roster" id="pi">
    <div class="roster-grid">
      <div class="r-col">
        <span class="r-lbl cyan">SHOWTIME</span>
        <span class="r-val">12:30<span class="r-val-ampm">PM</span></span>
      </div>
      <div class="r-col right">
        <span class="r-lbl magenta">VENUE</span>
        <span class="r-val">SUIT GROUND</span>
        <span class="r-sub">The Strike Zone</span>
      </div>
    </div>
    
    <div class="r-line"></div>
    
    <div class="r-col center">
      <span class="r-lbl">FACULTY DIRECTOR</span>
      <span class="r-val lg">PROF. DEEPIKA G</span>
    </div>
    
    <div class="r-line" style="margin-bottom: 24px;"></div>
  </div>

  <!-- 7 · Student Curators -->
  <div class="p-curators" id="pc">
    <div class="r-col center" style="margin-bottom:18px;">
      <span class="r-lbl cyan">STUDENT CURATORS</span>
    </div>
    <div class="c-layout">
      <div class="c-person">
        <span class="c-name cyan-glow">MONIKA M</span>
        <span class="c-role">LEAD</span>
      </div>
      <div class="c-person right">
        <span class="c-name magenta-glow">KEERTHANA K</span>
        <span class="c-role">LEAD</span>
      </div>
    </div>
  </div>

</div><!-- /poster -->


<script>
/* ═══════════════════════════════════════════════════════════
   HIGH-PERFORMANCE WEBGL (FBO-style Particles + Physics)
   Core architecture: Three.js Custom Shaders + Text Morphing
═══════════════════════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('bg-canvas');

  // Renderer
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    alpha: false,
    powerPreference: 'high-performance',
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x030012, 1);

  // Scene + Camera
  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 12;

  // Render "26" on a 2D canvas to get pixel coordinates
  const textCanvas = document.createElement('canvas');
  textCanvas.width = 512; textCanvas.height = 512;
  const ctx = textCanvas.getContext('2d');
  ctx.fillStyle = "white";
  ctx.font = "bold 260px 'Bebas Neue', sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("26", 256, 256);
  
  const imgData = ctx.getImageData(0, 0, 512, 512).data;
  const textPixels = [];
  for (let y = 0; y < 512; y += 3) {
    for (let x = 0; x < 512; x += 3) {
      if (imgData[(y * 512 + x) * 4 + 3] > 128) {
        textPixels.push({
          x: (x - 256) * 0.05,
          y: -(y - 256) * 0.05,
          z: (Math.random() - 0.5) * 1.5
        });
      }
    }
  }

  /* ── GPU Particle System ──────────────────────── */
  const COUNT = 30000; // High performance particle count
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(COUNT * 3);
  const target = new Float32Array(COUNT * 3);
  const cols = new Float32Array(COUNT * 3);

  // Palette: cyan, violet, magenta, gold
  const PALETTE = [
    [0.0,  0.898, 1.0],
    [0.43, 0.0,   1.0],
    [1.0,  0.0,   0.6],
    [1.0,  0.77,  0.0],
  ];

  for (let i = 0; i < COUNT; i++) {
    // Starting position: Exploded random outer sphere
    const radius = 25 + Math.random() * 30;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(Math.random() * 2 - 1);

    pos[i*3]   = radius * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = radius * Math.cos(phi);

    // Target position: Morph into "26" or ambient galactic dust
    if (textPixels.length > 0 && Math.random() > 0.4) { // 60% form the text
      const p = textPixels[Math.floor(Math.random() * textPixels.length)];
      target[i*3]   = p.x + (Math.random()-0.5)*0.2;
      target[i*3+1] = p.y + (Math.random()-0.5)*0.2;
      target[i*3+2] = p.z + (Math.random()-0.5)*0.2;
    } else { // 40% ambient galaxy dust
      target[i*3]   = (Math.random() - 0.5) * 40;
      target[i*3+1] = (Math.random() - 0.5) * 40;
      target[i*3+2] = -10 + (Math.random() - 0.5) * 30;
    }

    const c = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    // Make text particles brighter cyan/magenta
    cols[i*3]   = c[0] + (Math.random() * 0.2);
    cols[i*3+1] = c[1] + (Math.random() * 0.2);
    cols[i*3+2] = c[2] + (Math.random() * 0.2);
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('aTarget', new THREE.BufferAttribute(target, 3));
  geo.setAttribute('aColor', new THREE.BufferAttribute(cols, 3));

  // Custom Shader Material for Physics + FBO Morphing effect
  const uniforms = {
    uTime: { value: 0 },
    uProgress: { value: 0.0 }
  };

  const shaderMat = new THREE.ShaderMaterial({
    uniforms: uniforms,
    vertexShader: `
      uniform float uTime;
      uniform float uProgress;
      attribute vec3 aTarget;
      attribute vec3 aColor;
      varying vec3 vColor;
      
      void main() {
        vColor = aColor;
        
        // Physics logic: Interpolate from explosion to shape
        vec3 morphed = mix(position, aTarget, smoothstep(0.0, 1.0, uProgress));
        
        // Add turbulent hovering noise (Physics-based weight feel)
        float noise = sin(morphed.y * 3.0 + uTime * 2.0) * 0.8 * uProgress;
        morphed.x += sin(uTime + morphed.z) * noise;
        morphed.y += cos(uTime + morphed.x) * noise;
        morphed.z += sin(morphed.x * morphed.y) * noise;

        vec4 mvPosition = modelViewMatrix * vec4(morphed, 1.0);
        
        // Dynamic point size (particles close to camera are massive)
        gl_PointSize = (20.0 / -mvPosition.z) * (1.0 + sin(uTime * 3.0 + morphed.x * 10.0) * 0.5);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        // Create glowing soft spherical particles instead of squares
        vec2 xy = gl_PointCoord.xy - vec2(0.5);
        float ll = length(xy);
        if(ll > 0.5) discard;
        
        // Core glow math
        float alpha = (0.5 - ll) * 2.0;
        vec3 color = mix(vColor, vec3(1.0), smoothstep(0.2, 0.0, ll));
        gl_FragColor = vec4(color, alpha * 0.85);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending, // Bloom effect
    depthWrite: false,
  });

  const particleSystem = new THREE.Points(geo, shaderMat);
  scene.add(particleSystem);

  /* ── GSAP Particle Explosion Physics ──────────────── */
  if (typeof gsap !== 'undefined') {
    // Explode inwards and morph into the shape
    gsap.to(uniforms.uProgress, {
      value: 1.0,
      duration: 3.5,
      ease: "expo.inOut",
      delay: 0.2
    });
    
    // Slowly dissolve and float away after 10s
    gsap.to(uniforms.uProgress, {
      value: 0.4,
      duration: 15.0,
      ease: "sine.inOut",
      delay: 5.0,
      yoyo: true,
      repeat: -1
    });
  }

  /* ── Render loop ─────────────────────────── */
  let t = 0;
  (function animate() {
    requestAnimationFrame(animate);
    t += 0.005;
    uniforms.uTime.value = t;

    // Entire massive cloud slow rotation
    particleSystem.rotation.y = t * 0.1;
    particleSystem.rotation.x = Math.sin(t * 0.2) * 0.05;

    // Camera breathing
    camera.position.x = Math.sin(t * 0.5) * 1.5;
    camera.position.y = Math.cos(t * 0.4) * 0.8;

    renderer.render(scene, camera);
  })();

  /* ── Resize ──────────────────────────────── */
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();


/* ═══════════════════════════════════════════════════════════
   GSAP — ANIMATION + CHOREOGRAPHY
   Staggered entrance → glitch-in title → info cascade
═══════════════════════════════════════════════════════════ */
(function() {
  if (typeof gsap === 'undefined') return;

  // Initial states (hidden)
  gsap.set('#poster', { opacity: 0, y: 42, scale: 0.965 });
  gsap.set(['#ph','#pb','#pt','#pd','#pdt','#pi','#pc'], { opacity: 0, y: 22 });

  const tl = gsap.timeline({ delay: 0.4 });

  tl
    // 1 · Poster materialises
    .to('#poster', {
      opacity: 1, y: 0, scale: 1,
      duration: 1.0, ease: 'power3.out'
    })

    // 2 · Header slides in
    .to('#ph', {
      opacity: 1, y: 0,
      duration: 0.55, ease: 'power2.out'
    }, '-=0.45')

    // 3 · Event badge
    .to('#pb', {
      opacity: 1, y: 0,
      duration: 0.45, ease: 'power2.out'
    }, '-=0.22')

    // 4 · Title block — blur-punch in (GSAP + CSS glitch)
    .fromTo('#pt',
      { opacity: 0, y: 25, filter: 'blur(16px)' },
      { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.75, ease: 'power3.out' },
      '-=0.18'
    )

    // 5 · Divider
    .to('#pd', {
      opacity: 1, y: 0,
      duration: 0.42, ease: 'power2.out'
    }, '-=0.15')

    // 6 · Date — elastic spring
    .to('#pdt', {
      opacity: 1, y: 0,
      duration: 0.65, ease: 'back.out(2)'
    }, '-=0.08')

    // 7 · Info chips
    .to('#pi', {
      opacity: 1, y: 0,
      duration: 0.52, ease: 'power2.out'
    }, '-=0.12')

    // 8 · Coordinators
    .to('#pc', {
      opacity: 1, y: 0,
      duration: 0.48, ease: 'power2.out'
    }, '-=0.18');

})();
</script>
</body>
